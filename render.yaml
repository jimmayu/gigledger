services:
  - type: web
    name: gigledger
    runtime: docker
    plan: free
    envVars:
      - key: NODE_ENV
        value: production
      - key: AUTH_MODE
        value: enabled
      - key: ADMIN_USERNAME
        value: admin
      - key: ADMIN_PASSWORD
        generateValue: true
      - key: SESSION_SECRET
        generateValue: true
      - key: DATABASE_PATH
        value: /app/data/ledger.db
    healthCheckPath: /api/health
