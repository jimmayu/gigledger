services:
  gigledger:
    build: .
#    ports:
#      - "3000:3000"
    volumes:
      # Mount SQLite database as persistent volume
      - ./data:/app/data
    environment:
      - NODE_ENV=production
      - DATABASE_PATH=/app/data/ledger.db
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.gigledger.rule=Host(`rosick.com`) && PathPrefix(`/gigledger`)"
      - "traefik.http.services.gigledger.loadbalancer.server.port=3000"
      - "traefik.http.routers.gigledger.entrypoints=websecure"
      - "traefik.http.routers.gigledger.tls=true"
      - "traefik.http.routers.gigledger.tls.certresolver=myresolver"
      - "traefik.http.routers.gigledger.middlewares=login-ratelimit@file"

    networks:
      - Traefik-proxy-v6

networks:
  Traefik-proxy-v6:
    external: true
    name: Traefik-proxy-v6
